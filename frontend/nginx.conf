server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Admin endpoints (re-ingest/re-embed) aren't meant for public use — anyone with
    # the link could otherwise burn through the TMDB/Voyage quotas. Run those from the
    # server itself instead (e.g. `docker compose exec backend curl localhost:8000/admin/...`).
    location /api/admin/ {
        return 403;
    }

    # Strips the /api prefix so /api/chat reaches the backend's /chat route.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
